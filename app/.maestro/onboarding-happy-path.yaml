appId: host.exp.Exponent
name: E2E-001 Onboarding full happy path lands on tabs
---
- launchApp:
    clearState: true
- openLink: suliv://login#access_token=${ONBOARDING_ACCESS_TOKEN}&refresh_token=${ONBOARDING_REFRESH_TOKEN}
- assertVisible:
    id: onboarding-welcome-start-button
- tapOn:
    id: onboarding-welcome-start-button
- assertVisible:
    id: onboarding-diet-option-vegano
- tapOn:
    id: onboarding-diet-option-vegano
- tapOn:
    id: onboarding-continue-button
- assertVisible:
    id: onboarding-allergy-search-input
- tapOn:
    id: onboarding-allergy-search-input
- inputText: Leite
- tapOn: Leite
- tapOn:
    id: onboarding-allergy-search-input
- eraseText
- inputText: quinoa em pó
- tapOn:
    id: onboarding-allergy-add-new-term
- tapOn:
    id: onboarding-continue-button
- assertVisible:
    id: onboarding-level-option-iniciante
- tapOn:
    id: onboarding-level-option-iniciante
- tapOn:
    id: onboarding-frequency-option-raramente
- tapOn:
    id: onboarding-submit-button
- assertVisible: Início
