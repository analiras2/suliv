appId: host.exp.Exponent
name: E2E-005 Empty Minhas Receitas shows a create CTA; populated correctly after creating and submitting
---
# Requires the dedicated RECIPE_AUTHOR_* token pair (a test-project user with
# no authored recipes yet), same as my-recipes-offline-create-sync-submit.yaml.
- launchApp:
    clearState: true
- openLink: suliv://login#access_token=${RECIPE_AUTHOR_ACCESS_TOKEN}&refresh_token=${RECIPE_AUTHOR_REFRESH_TOKEN}
- tapOn: Você
- tapOn:
    id: settings-my-recipes
- assertVisible:
    id: my-recipes-empty-state
- assertVisible: Nenhuma receita ainda
- tapOn:
    id: my-recipes-create-cta
- tapOn:
    id: recipe-form-title
- inputText: Sopa de abóbora
- tapOn:
    id: recipe-form-description
- inputText: Uma sopa cremosa para dias frios.
- tapOn:
    id: recipe-form-prep-time
- inputText: "30"
- tapOn:
    id: recipe-form-servings
- inputText: "4"
- tapOn:
    id: ingredient-add
- tapOn:
    id: ingredient-name-0
- inputText: Abóbora
- tapOn:
    id: ingredient-quantity-0
- inputText: "1"
- tapOn:
    id: step-add
- tapOn:
    id: step-description-0
- inputText: Cozinhe a abóbora e bata no liquidificador.
- tapOn:
    id: recipe-form-pick-image
# Assumes the test device/simulator's photo library has at least one fixture
# image available to pick.
- tapOn:
    id: recipe-form-submit
- assertVisible: Suas criações
- assertNotVisible:
    id: my-recipes-empty-state
- assertVisible: Sopa de abóbora
- assertVisible: Em análise
