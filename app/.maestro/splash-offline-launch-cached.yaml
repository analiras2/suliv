appId: host.exp.Exponent
name: E2E-003 Airplane-mode launch with a cached completed profile
---
# Seed the offline cache: log in online once so critical-data-service
# writes cache:profile-snapshot with onboardingCompletedAt set.
- launchApp:
    clearState: true
- openLink: suliv://login#access_token=${PERSISTED_ACCESS_TOKEN}&refresh_token=${PERSISTED_REFRESH_TOKEN}
- assertVisible: Início
- stopApp
- setAirplaneMode: true
- launchApp
- assertVisible: Início
- assertNotVisible:
    id: login-email-input
- assertNotVisible:
    id: splash-error-view
- setAirplaneMode: false
