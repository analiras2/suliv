appId: host.exp.Exponent
name: E2E-001 Cold launch with valid session and connectivity
---
- launchApp:
    clearState: true
- openLink: suliv://login#access_token=${PERSISTED_ACCESS_TOKEN}&refresh_token=${PERSISTED_REFRESH_TOKEN}
- assertVisible: Início
- stopApp
- launchApp
- assertVisible: Início
- assertNotVisible:
    id: login-email-input
- assertNotVisible:
    id: splash-error-view
