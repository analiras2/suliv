appId: host.exp.Exponent
name: E2E-002 Submit failure shows inline error and succeeds on retry
---
- launchApp:
    clearState: true
- openLink: suliv://login#access_token=${ONBOARDING_ACCESS_TOKEN}&refresh_token=${ONBOARDING_REFRESH_TOKEN}
- assertVisible:
    id: onboarding-diet-option-vegano
- tapOn:
    id: onboarding-diet-option-vegano
- tapOn:
    id: onboarding-continue-button
- tapOn:
    id: onboarding-continue-button
- assertVisible:
    id: onboarding-level-option-iniciante
- tapOn:
    id: onboarding-level-option-iniciante
- tapOn:
    id: onboarding-frequency-option-raramente
- setAirplaneMode: true
- tapOn:
    id: onboarding-submit-button
- assertVisible:
    id: onboarding-error-message
- assertVisible:
    id: onboarding-retry-button
- setAirplaneMode: false
- tapOn:
    id: onboarding-retry-button
- assertVisible: Início
